services:

  # ── PHP-FPM Application (production) ─────────────────────────────────────
  php:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile
      target: prod
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8
    # No volume mounts — code baked into the image
    volumes: []
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  # ── Nginx Web Server (production) ────────────────────────────────────────
  nginx:
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M

  # ── PostgreSQL Database (production) ─────────────────────────────────────
  database:
    # Do NOT expose the database port publicly in production
    ports: []
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
