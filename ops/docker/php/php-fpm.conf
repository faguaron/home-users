; ── PHP-FPM Pool Configuration ────────────────────────────────────────────
[www]

; Socket — use TCP so Nginx can connect by service name
listen = 0.0.0.0:9000

; Process manager
; dynamic: spawn workers on demand between pm.min_spare_servers and pm.max_children
pm                   = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests      = 500

; User / group
user  = www-data
group = www-data

; Logging — send slow requests to stderr
slowlog                   = /proc/self/fd/2
request_slowlog_timeout   = 5s

; Pass environment variables to PHP-FPM workers
clear_env = no

; Status endpoint (scraped by monitoring)
pm.status_path = /status
ping.path      = /ping
