services:

  # ── PHP-FPM Application ───────────────────────────────────────────────────
  php:
    build:
      context: ../..
      dockerfile: ops/docker/Dockerfile
      target: dev
    environment:
      APP_ENV: dev
      APP_SECRET: ${APP_SECRET:-centro-cultural-aragon-tarragona-secret}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-secret}@database:5432/${POSTGRES_DB:-home_users}?serverVersion=16&charset=utf8
    volumes:
      # Mount source for live reload during development
      - ../..:/var/www/html
      # Persist Symfony cache and logs separately
      - php_var:/var/www/html/var
    depends_on:
      database:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  # ── Nginx Web Server ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../..:/var/www/html:ro
    depends_on:
      - php
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/users"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── PostgreSQL Database ───────────────────────────────────────────────────
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-home_users}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - database_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-home_users}", "-U", "${POSTGRES_USER:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  php_var:
  database_data:

networks:
  backend:
    driver: bridge
