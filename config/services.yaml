# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            Psr\Log\LoggerInterface $apiLogger: '@monolog.logger.api'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # Bind the repository interface to its Doctrine implementation
    App\User\Domain\Repository\UserRepositoryInterface:
        class: App\User\Infrastructure\Persistence\DoctrineUserRepository

    # Tag the logging middleware so buses can collect it
    App\Shared\Infrastructure\Bus\Middleware\OpenApiLoggingMiddleware:
        tags:
            - { name: app.bus.middleware }

    # Command bus wired with middleware and a handler locator
    App\Shared\Infrastructure\Bus\CommandBus:
        arguments:
            $middleware: !tagged_iterator app.bus.middleware
            $handlers: !service_locator
                'App\User\Application\Create\CreateUserCommand': '@App\User\Application\Create\CreateUserCommandHandler'
                'App\User\Application\Update\UpdateUserCommand': '@App\User\Application\Update\UpdateUserCommandHandler'
                'App\User\Application\Delete\DeleteUserCommand': '@App\User\Application\Delete\DeleteUserCommandHandler'

    # Query bus wired with middleware and a handler locator
    App\Shared\Infrastructure\Bus\QueryBus:
        arguments:
            $middleware: !tagged_iterator app.bus.middleware
            $handlers: !service_locator
                'App\User\Application\Find\FindUserQuery': '@App\User\Application\Find\FindUserQueryHandler'
                'App\User\Application\FindAll\FindAllUsersQuery': '@App\User\Application\FindAll\FindAllUsersQueryHandler'

    # Bind bus interfaces to their concrete implementations
    App\Shared\Application\Bus\Command\CommandBusInterface:
        alias: App\Shared\Infrastructure\Bus\CommandBus

    App\Shared\Application\Bus\Query\QueryBusInterface:
        alias: App\Shared\Infrastructure\Bus\QueryBus

when@test:
    services:
        _defaults:
            autowire: true
            autoconfigure: true
            bind:
                string $projectDir: '%kernel.project_dir%'
        Tests\Behat\:
            resource: '../tests/Behat/'
