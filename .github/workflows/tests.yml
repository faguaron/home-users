name: Tests

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    services:
      database:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: home_users_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker dev image
        run: docker build --target dev -t home-users:dev -f ops/docker/Dockerfile .

      - name: Create test database schema
        run: |
          docker run --rm \
            --network host \
            -e APP_ENV=test \
            -e APP_SECRET='$ecretf0rt3st' \
            -e DATABASE_URL="postgresql://app:secret@localhost:5432/home_users_test?serverVersion=16&charset=utf8" \
            home-users:dev \
            php bin/console doctrine:schema:create --env=test

      - name: Run unit tests
        run: |
          docker run --rm \
            --network host \
            -e APP_ENV=test \
            -e APP_SECRET='$ecretf0rt3st' \
            -e DATABASE_URL="postgresql://app:secret@localhost:5432/home_users_test?serverVersion=16&charset=utf8" \
            home-users:dev \
            composer test:unit

      - name: Run Behat tests
        run: |
          docker run --rm \
            --network host \
            -e APP_ENV=test \
            -e APP_SECRET='$ecretf0rt3st' \
            -e DATABASE_URL="postgresql://app:secret@localhost:5432/home_users_test?serverVersion=16&charset=utf8" \
            home-users:dev \
            composer test:behat
